<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Puzzle Piece Generator</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            padding: 20px;
            text-align: center;
            background: #f5f5f5;
        }

        .controls {
            margin-bottom: 20px;
        }

        canvas {
            display: none;
        }

        button {
            padding: 10px 20px;
            border: none;
            background: black;
            color: white;
            cursor: pointer;
            border-radius: 8px;
            margin-top: 10px;
        }

        #pieces {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
            gap: 15px;
            margin-top: 20px;
        }

        .piece-box {
            background: white;
            padding: 10px;
            border-radius: 10px;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
        }

        img {
            width: 100%;
            border-radius: 6px;
        }

        a {
            display: inline-block;
            margin-top: 8px;
            text-decoration: none;
            color: blue;
        }
    </style>
</head>

<body>

    <h1>Puzzle Piece Generator</h1>

    <div class="controls">
        <input type="file" id="imageInput" accept="image/*">

        <br><br>

        <label>Puzzle Size:</label>

        <select id="gridSize">
            <option value="2">2 x 2</option>
            <option value="3" selected>3 x 3</option>
            <option value="4">4 x 4</option>
            <option value="5">5 x 5</option>
        </select>

        <br><br>

        <button onclick="generatePieces()">Generate Puzzle Pieces</button>
    </div>

    <canvas id="canvas"></canvas>

    <div id="pieces"></div>

    <script>
        function generatePieces() {

            const fileInput = document.getElementById("imageInput");
            const gridSize = parseInt(document.getElementById("gridSize").value);
            const piecesContainer = document.getElementById("pieces");

            piecesContainer.innerHTML = "";

            if (!fileInput.files[0]) {
                alert("Please upload an image.");
                return;
            }

            const img = new Image();

            img.onload = function () {

                const minDimension = Math.min(img.width, img.height);
                const startX = (img.width - minDimension) / 2;
                const startY = (img.height - minDimension) / 2;

                const pieceSize = minDimension / gridSize;

                for (let row = 0; row < gridSize; row++) {

                    for (let col = 0; col < gridSize; col++) {

                        const canvas = document.createElement("canvas");
                        const ctx = canvas.getContext("2d");

                        canvas.width = pieceSize;
                        canvas.height = pieceSize;

                        if (row === gridSize - 1 && col === gridSize - 1) {
                            // Make the last tile blank (white)
                            ctx.fillStyle = "#ffffff";
                            ctx.fillRect(0, 0, pieceSize, pieceSize);
                        } else {
                            ctx.drawImage(
                                img,
                                startX + col * pieceSize,
                                startY + row * pieceSize,
                                pieceSize,
                                pieceSize,
                                0,
                                0,
                                pieceSize,
                                pieceSize
                            );
                        }

                        const imageURL = canvas.toDataURL("image/png");

                        const box = document.createElement("div");
                        box.className = "piece-box";

                        const imageElement = document.createElement("img");
                        imageElement.src = imageURL;

                        const downloadLink = document.createElement("a");
                        downloadLink.href = imageURL;
                        downloadLink.download = `piece-${row}-${col}.png`;
                        downloadLink.innerText = "Download";

                        box.appendChild(imageElement);
                        box.appendChild(downloadLink);

                        piecesContainer.appendChild(box);
                    }
                }
            };

            img.src = URL.createObjectURL(fileInput.files[0]);
        }
    </script>

</body>

</html>
